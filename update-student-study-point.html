<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✏️ Update Student Fee · Fee Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f5fa; padding: 16px 12px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .page-header { background: white; border-radius: 40px; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .page-header h1 { font-size: 1.6rem; color: #113a5e; display: flex; align-items: center; gap: 8px; margin: 0; }
        .back-link a { color: #1b4f9b; text-decoration: none; display: flex; align-items: center; gap: 6px; font-weight: 500; padding: 6px 16px; background: #e8f0fe; border-radius: 40px; }
        
        .filter-panel { background: white; border-radius: 50px; padding: 16px 22px; display: flex; flex-wrap: wrap; align-items: center; gap: 16px 25px; margin-bottom: 20px; }
        .filter-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-group label { font-weight: 600; color: #154e7a; display: flex; align-items: center; gap: 4px; margin: 0; }
        select, .search-input { background: #e8f2ff; border: 1px solid #b1cdf0; border-radius: 40px; padding: 8px 20px; font-size: 0.95rem; color: #10345c; outline: none; }
        .search-input { width: 200px; cursor: text; }
        
        .download-btn { background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .download-btn:hover { background: #b91c1c; }
        
        .table-card { background: white; border-radius: 30px; padding: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #1b4f9b; color: white; padding: 12px 8px; font-weight: 600; font-size: 0.9rem; text-align: left; }
        th:first-child { border-radius: 16px 0 0 0; }
        th:last-child { border-radius: 0 16px 0 0; }
        td { padding: 12px 8px; border-bottom: 1px solid #e0eaf5; vertical-align: middle; }
        
        .student-name { font-weight: 600; color: #113155; cursor: pointer; }
        .student-name:hover { text-decoration: underline; color: #1b4f9b; }
        .father-name { font-size: 0.85rem; color: #5f6b7a; }
        .roll-badge { background: #e8f0fe; padding: 4px 10px; border-radius: 30px; font-weight: 600; display: inline-block; font-size: 0.85rem; }
        .amount-badge { background: #e8f0fe; padding: 4px 10px; border-radius: 30px; font-weight: 600; display: inline-block; font-size: 0.85rem; }
        .due-badge { background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 30px; font-weight: 600; display: inline-block; }
        .paid-badge { background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 30px; font-weight: 600; display: inline-block; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .update-btn { background: #2563eb; color: white; border: none; padding: 6px 14px; border-radius: 40px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; }
        .update-btn:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        .delete-btn { background: #dc2626; color: white; border: none; padding: 6px 14px; border-radius: 40px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; }
        .delete-btn:hover { background: #b91c1c; }
        .history-btn { background: #6c757d; color: white; border: none; padding: 6px 14px; border-radius: 40px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; }
        
        .loading { text-align: center; padding: 40px; font-size: 1.1rem; color: #1b4f9b; }
        .empty-message { text-align: center; padding: 40px; background: white; border-radius: 30px; color: #5f6b7a; }
        
        .progress-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .progress-card { background: white; border-radius: 30px; padding: 30px; text-align: center; max-width: 350px; width: 90%; }
        .progress-bar-container { width: 100%; height: 16px; background: #e2e8f0; border-radius: 20px; overflow: hidden; margin: 15px 0; }
        .progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #1b4f9b, #2563eb); border-radius: 20px; transition: width 0.3s ease; }
        .spinner { width: 45px; height: 45px; border: 4px solid #e2e8f0; border-top: 4px solid #1b4f9b; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .transaction-item { background: #f8faff; border-radius: 16px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #1b4f9b; }
        .invoice-small-btn { background: #16a34a; color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        
        @media (max-width: 600px) {
            .page-header h1 { font-size: 1.3rem; }
            .filter-group { width: 100%; }
            select, .search-input { width: 100%; }
            td, th { padding: 8px 5px; font-size: 0.8rem; }
            .action-buttons { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-edit"></i> Update Student Fee</h1>
            <div class="back-link"><a href="dashboard-study-point.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a></div>
        </div>
        <div class="filter-panel">
            <div class="filter-group"><label><i class="fas fa-search"></i> Search Roll No</label><input type="text" id="rollSearchInput" class="search-input" placeholder="Enter roll number..."></div>
            <div class="filter-group"><label><i class="fas fa-calendar-alt"></i> Session</label><select id="sessionFilter"><option value="2024-25">2024-25</option><option value="2025-26">2025-26</option><option value="2026-27" selected>2026-27</option></select></div>
            <div class="filter-group"><label><i class="fas fa-school"></i> Class</label><select id="classFilter"><option value="All">All Classes</option><option value="Class 6">Class 6</option><option value="Class 7">Class 7</option><option value="Class 8">Class 8</option><option value="Class 9">Class 9</option><option value="Class 10">Class 10</option><option value="Class 11">Class 11</option><option value="Class 12">Class 12</option></select></div>
            <div class="filter-group"><button id="downloadPdfBtn" class="download-btn"><i class="fas fa-file-pdf"></i> Download PDF Report</button></div>
        </div>
        <div class="table-card"><div id="studentsTableContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading students...</div></div></div>
    </div>

    <div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content" style="border-radius: 25px;"><div class="modal-header"><h5 class="modal-title" style="color:#1b4f9b;"><i class="fas fa-rupee-sign"></i> Update Fee</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="modalStudentInfo" style="background:#f8faff;padding:15px;border-radius:18px;margin-bottom:20px;"></div><div class="mb-3"><label class="form-label fw-bold">Additional Amount (₹)</label><input type="number" id="additionalAmount" class="form-control" min="1" placeholder="Enter amount" style="border-radius:20px;"></div><div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="generateInvoiceCheck" checked><label class="form-check-label fw-bold"><i class="fas fa-file-invoice"></i> Generate Invoice</label></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" id="confirmUpdateBtn" class="btn btn-primary" style="background:#1b4f9b;">Update</button></div></div></div></div>

    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" style="color:#1b4f9b;"><i class="fas fa-history"></i> Transaction History</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="historyStudentInfo" style="background:#f8faff;padding:15px;border-radius:18px;margin-bottom:20px;"></div><div id="transactionsList"></div></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div></div></div></div>

    <div id="progressOverlay" class="progress-overlay"><div class="progress-card"><div class="spinner"></div><h3>Processing</h3><div class="progress-bar-container"><div id="progressFill" class="progress-bar-fill"></div></div><div id="progressText" class="progress-text">0% Complete</div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDN5ATO_LQ-3THveZDGyvLjtjjavgTIJk",
            authDomain: "study-point-coaching-centre.firebaseapp.com",
            projectId: "study-point-coaching-centre",
            storageBucket: "study-point-coaching-centre.firebasestorage.app"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const feesCollection = db.collection('fees_study_point');
        const transactionsCollection = db.collection('transactions_study_point');

        const COACHING_DETAILS = {
            name: "STUDY POINT COACHING CENTRE",
            phone: "6202608202",
            email: "studypoint@gmail.com",
            address: "Muzaffarpur, Bihar",
            bank: {
                accountName: "GUDDU KUMAR",
                bankName: "State Bank of India",
                accountNumber: "12345678901",
                ifsc: "SBIN0001234",
                upi: "6202608202@ybl"
            }
        };

        const TERMS_CONDITIONS_HINDI = [
            "एक बार जमा की गई फीस किसी भी परिस्थिति में वापस (Refund) या स्थानांतरित (Transfer) नहीं की जाएगी।",
            "यदि आप ट्यूशन शुल्क दो किश्तों (Installments) में जमा करते हैं, तो पहली किश्त कुल शुल्क (Fee) का 50% नामांकन के समय और दूसरी किश्त बाकी का 50% शुल्क (Fee) नामांकन की तिथि से एक माह के भीतर जमा करनी होगी।",
            "दूसरी किश्त (Installment) समय पर जमा न होने की स्थिति में छात्र के कक्षा प्रवेश पर प्रतिबंध लगाया जा सकता है।",
            "बिना किसी पूर्व सूचना के लगातार 10 दिनों तक अनुपस्थित रहने पर छात्र का नामांकन रद्द (नाम काटा) किया जा सकता है।",
            "संस्थान में अभद्र व्यवहार करने या मोबाइल का दुरुपयोग करने पर छात्र का नामांकन तत्काल प्रभाव से रद्द किया जा सकता है।",
            "छात्र के व्यक्तिगत सामान (जैसे- साइकिल, मोबाइल, बैग आदि) की सुरक्षा की पूरी जिम्मेदारी स्वयं छात्र की होगी।",
            "संस्थान के पास बैच के समय और नियमों में किसी भी प्रकार के बदलाव का पूर्ण अधिकार सुरक्षित है।",
            "किसी भी प्रकार के कानूनी विवाद या मतभेद की स्थिति में, न्यायिक क्षेत्राधिकार केवल जिला न्यायालय, मुजफ्फरपुर (बिहार) के अधीन होगा।"
        ];

        function generateInvoiceNumber() { return "SPC" + Date.now().toString().slice(-8) + Math.floor(Math.random() * 10000).toString().padStart(4, '0'); }

        const sessionFilter = document.getElementById('sessionFilter');
        const classFilter = document.getElementById('classFilter');
        const rollSearchInput = document.getElementById('rollSearchInput');
        const tableContainer = document.getElementById('studentsTableContainer');
        const modalStudentInfo = document.getElementById('modalStudentInfo');
        const additionalAmount = document.getElementById('additionalAmount');
        const generateInvoiceCheck = document.getElementById('generateInvoiceCheck');
        const confirmUpdateBtn = document.getElementById('confirmUpdateBtn');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');

        const updateModal = new bootstrap.Modal(document.getElementById('updateModal'));
        const historyModal = new bootstrap.Modal(document.getElementById('historyModal'));

        let allStudents = [];
        let selectedStudent = null;

        function showSuccessToast(m) { Swal.fire({ icon: 'success', title: 'Success!', text: m, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 }); }
        function showErrorToast(m) { Swal.fire({ icon: 'error', title: 'Error!', text: m, toast: true, position: 'top-end', showConfirmButton: false, timer: 4000 }); }
        async function showDeleteConfirmation(n) { return await Swal.fire({ title: 'Are you sure?', html: `Delete <strong>${n}</strong>?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626', confirmButtonText: 'Yes, delete!' }); }
        function showFullyPaidPopup(n) { Swal.fire({ title: 'Fully Paid!', html: `<strong>${n}</strong> has already paid the full fee.`, icon: 'info' }); }
        function updateProgress(p) { progressFill.style.width = p + '%'; progressText.textContent = p + '% Complete'; }
        function showProgress() { progressOverlay.style.display = 'flex'; updateProgress(0); }
        function hideProgress() { progressOverlay.style.display = 'none'; }

        async function loadStudents() {
            try {
                const snapshot = await feesCollection.get();
                allStudents = [];
                snapshot.forEach(doc => { allStudents.push({ id: doc.id, ...doc.data() }); });
                renderTable();
            } catch (error) { tableContainer.innerHTML = '<div class="empty-message">Error loading: ' + error.message + '</div>'; }
        }

        function renderTable() {
            let filtered = allStudents.filter(s => s.session === sessionFilter.value);
            if (classFilter.value !== 'All') filtered = filtered.filter(s => s.class === classFilter.value);
            const searchRoll = rollSearchInput.value.trim().toLowerCase();
            if (searchRoll) filtered = filtered.filter(s => (s.roll_number || '').toString().toLowerCase().includes(searchRoll));
            if (filtered.length === 0) { tableContainer.innerHTML = '<div class="empty-message">📭 No students found</div>'; return; }
            
            let html = `<table><thead><tr><th>Roll No</th><th>Student Name</th><th>Father Name</th><th>Total (₹)</th><th>Received (₹)</th><th>Due (₹)</th><th>Actions</th></tr></thead><tbody>`;
            filtered.forEach(s => {
                const isFullyPaid = s.due_amount <= 0;
                const dueBadgeClass = isFullyPaid ? 'paid-badge' : 'due-badge';
                const dueText = isFullyPaid ? 'PAID' : `₹${Number(s.due_amount).toLocaleString()}`;
                html += `<tr><td><span class="roll-badge">${s.roll_number || '-'}</span></td>
                    <td><div><span class="student-name" onclick="showStudentDetails('${s.id}')">${s.student_name || '-'}</span></div><div class="father-name"><i class="fas fa-phone-alt"></i> ${s.phone_number || 'N/A'}</div></td>
                    <td>${s.father_name || '-'}</td>
                    <td><span class="amount-badge">₹${Number(s.total_amount).toLocaleString()}</span></td>
                    <td><span class="amount-badge">₹${Number(s.received_amount).toLocaleString()}</span></td>
                    <td><span class="${dueBadgeClass}">${dueText}</span></td>
                    <td><div class="action-buttons"><button class="history-btn" onclick="showTransactionHistory('${s.id}')"><i class="fas fa-history"></i> History</button>
                    <button class="update-btn" onclick="openUpdateModal('${s.id}')" ${isFullyPaid ? 'disabled' : ''}><i class="fas fa-edit"></i> Update</button>
                    <button class="delete-btn" onclick="deleteStudent('${s.id}', '${s.student_name}')"><i class="fas fa-trash-alt"></i> Delete</button></div></td></tr>`;
            });
            html += `</tbody>}`;
            tableContainer.innerHTML = html;
        }

        window.showStudentDetails = function(studentId) {
            const student = allStudents.find(s => s.id === studentId);
            if (!student) return;
            Swal.fire({
                title: `<strong>${student.student_name}</strong>`,
                html: `<div style="text-align: left;"><div><strong>🎫 Roll No:</strong> ${student.roll_number}</div><div><strong>👨 Father:</strong> ${student.father_name}</div><div><strong>📞 Phone:</strong> ${student.phone_number || 'N/A'}</div><div><strong>🏫 Class:</strong> ${student.class}</div><div><strong>📅 Session:</strong> ${student.session}</div><hr><div><strong>💰 Total Amount:</strong> ₹${Number(student.total_amount).toLocaleString()}</div><div><strong>💵 Received:</strong> ₹${Number(student.received_amount).toLocaleString()}</div><div><strong>⏳ Due:</strong> <span style="color:${student.due_amount <= 0 ? 'green' : 'red'}">₹${Number(student.due_amount).toLocaleString()}</span></div></div>`,
                icon: 'info', confirmButtonColor: '#1b4f9b', confirmButtonText: 'Close'
            });
        };

        window.showTransactionHistory = async function(studentId) {
            const student = allStudents.find(s => s.id === studentId);
            if (!student) return;
            document.getElementById('historyStudentInfo').innerHTML = `<div><strong>${student.student_name}</strong><br>Roll: ${student.roll_number} | Class: ${student.class}<br>Total Paid: ₹${Number(student.received_amount).toLocaleString()} | Due: ₹${Number(student.due_amount).toLocaleString()}</div>`;
            document.getElementById('transactionsList').innerHTML = '<p class="text-center"><i class="fas fa-spinner fa-spin"></i> Loading transactions...</p>';
            historyModal.show();
            try {
                const snapshot = await transactionsCollection.where('studentId', '==', studentId).get();
                let transactions = []; snapshot.forEach(doc => transactions.push({ id: doc.id, ...doc.data() }));
                if (transactions.length === 0) document.getElementById('transactionsList').innerHTML = '<p class="text-center text-muted">📭 No transactions found</p>';
                else {
                    transactions.sort((a, b) => (b.created_at?.toDate?.() || new Date(b.date)) - (a.created_at?.toDate?.() || new Date(a.date)));
                    let html = '';
                    transactions.forEach(t => {
                        const date = t.created_at?.toDate ? t.created_at.toDate() : new Date(t.date);
                        html += `<div class="transaction-item"><div style="display:flex; justify-content:space-between; flex-wrap:wrap; align-items:center;"><div><span style="font-weight:700;">+ ₹${Number(t.amount).toLocaleString()}</span><div style="font-size:0.75rem;">${date.toLocaleDateString()} ${date.toLocaleTimeString()}</div><div>ID: ${t.transactionId}</div><div>Invoice: ${t.invoiceNumber || 'N/A'}</div></div><button class="invoice-small-btn" onclick="generateInvoiceForTransaction('${studentId}', '${t.transactionId}', '${t.invoiceNumber || ''}', ${t.amount})">Invoice</button></div></div>`;
                    });
                    document.getElementById('transactionsList').innerHTML = html;
                }
            } catch (error) { document.getElementById('transactionsList').innerHTML = `<p class="text-center text-danger">Error: ${error.message}</p>`; }
        };

        window.generateInvoiceForTransaction = async function(studentId, transactionId, savedInvoiceNumber, amount) {
            const student = allStudents.find(s => s.id === studentId);
            if (!student) return;
            showProgress(); updateProgress(50);
            try {
                let invoiceNumber = savedInvoiceNumber || generateInvoiceNumber();
                const invoiceData = { student: student, paymentAmount: amount, date: new Date(), transactionId: transactionId, invoiceNumber: invoiceNumber, coaching: COACHING_DETAILS };
                hideProgress();
                const invoiceHTML = generateInvoiceHTML(invoiceData);
                const win = window.open(); win.document.write(invoiceHTML); win.document.close();
            } catch (error) { hideProgress(); showErrorToast('Error: ' + error.message); }
        };

        window.deleteStudent = async function(studentId, studentName) {
            const result = await showDeleteConfirmation(studentName);
            if (!result.isConfirmed) return;
            showProgress();
            try {
                const txns = await transactionsCollection.where('studentId', '==', studentId).get();
                const batch = db.batch();
                txns.forEach(doc => batch.delete(doc.ref));
                batch.delete(feesCollection.doc(studentId));
                await batch.commit();
                hideProgress(); showSuccessToast(`✅ "${studentName}" deleted successfully`); await loadStudents();
            } catch (error) { hideProgress(); showErrorToast('Error: ' + error.message); }
        };

        window.openUpdateModal = function(studentId) {
            selectedStudent = allStudents.find(s => s.id === studentId);
            if (!selectedStudent) return;
            if (selectedStudent.due_amount <= 0) { showFullyPaidPopup(selectedStudent.student_name); return; }
            modalStudentInfo.innerHTML = `<div style="text-align:center;"><strong>${selectedStudent.student_name}</strong><br>Roll: ${selectedStudent.roll_number}<br><span style="color:#b91c1c;">Due: ₹${Number(selectedStudent.due_amount).toLocaleString()}</span></div>`;
            additionalAmount.value = ''; updateModal.show();
        };

        confirmUpdateBtn.addEventListener('click', async () => {
            if (!selectedStudent) return;
            const amount = parseFloat(additionalAmount.value);
            if (isNaN(amount) || amount <= 0) { showErrorToast('Please enter a valid amount'); return; }
            if (amount > selectedStudent.due_amount) { showErrorToast(`Cannot exceed due amount of ₹${selectedStudent.due_amount.toLocaleString()}`); return; }
            updateModal.hide(); showProgress();
            try {
                const newReceived = (selectedStudent.received_amount || 0) + amount;
                const newDue = Math.max(0, (selectedStudent.total_amount || 0) - newReceived);
                const transactionId = 'TXN' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                const invoiceNumber = generateInvoiceNumber();
                await transactionsCollection.add({ studentId: selectedStudent.id, studentName: selectedStudent.student_name, rollNumber: selectedStudent.roll_number, amount: amount, previousReceived: selectedStudent.received_amount, newReceived: newReceived, previousDue: selectedStudent.due_amount, newDue: newDue, transactionId: transactionId, invoiceNumber: invoiceNumber, date: new Date().toISOString(), created_at: firebase.firestore.FieldValue.serverTimestamp() });
                await feesCollection.doc(selectedStudent.id).update({ received_amount: newReceived, due_amount: newDue });
                selectedStudent.received_amount = newReceived; selectedStudent.due_amount = newDue;
                await loadStudents();
                if (generateInvoiceCheck.checked) {
                    const invoiceData = { student: selectedStudent, paymentAmount: amount, date: new Date(), transactionId: transactionId, invoiceNumber: invoiceNumber, coaching: COACHING_DETAILS };
                    hideProgress();
                    const invoiceHTML = generateInvoiceHTML(invoiceData);
                    const win = window.open(); win.document.write(invoiceHTML); win.document.close();
                } else { hideProgress(); showSuccessToast(`✅ ₹${amount.toLocaleString()} added for ${selectedStudent.student_name}`); }
            } catch (error) { hideProgress(); showErrorToast('Error: ' + error.message); }
        });

        function generateInvoiceHTML(data) {
            const s = data.student, c = data.coaching;
            let feeRows = '';
            let subtotal = 0;
            const fb = s.fee_breakdown || {};
            
            if (fb.admission_fee > 0) { feeRows += `<tr><td>📋 Admission Fee</td><td style="text-align:right;">₹${fb.admission_fee}/-</td></tr>`; subtotal += fb.admission_fee; }
            if (fb.tuition_fee > 0) { feeRows += `<tr><td>📚 Tuition Fee</td><td style="text-align:right;">₹${fb.tuition_fee}/-</td></tr>`; subtotal += fb.tuition_fee; }
            if (fb.activity_fee > 0) { feeRows += `<tr><td>⚡ Activity Fee</td><td style="text-align:right;">₹${fb.activity_fee}/-</td></tr>`; subtotal += fb.activity_fee; }
            if (fb.exam_fee > 0) { feeRows += `<tr><td>📝 Exam Fee</td><td style="text-align:right;">₹${fb.exam_fee}/-</td></tr>`; subtotal += fb.exam_fee; }
            if (fb.misc_fee > 0) { feeRows += `<tr><td>🔄 Miscellaneous Fee</td><td style="text-align:right;">₹${fb.misc_fee}/-</td></tr>`; subtotal += fb.misc_fee; }
            if (fb.other_fee > 0) { feeRows += `<tr><td>➕ Other Fee</td><td style="text-align:right;">₹${fb.other_fee}/-</td></tr>`; subtotal += fb.other_fee; }
            if (fb.discount > 0) { feeRows += `<tr style="color:#b91c1c;"><td>🎁 Discount</td><td style="text-align:right;">- ₹${fb.discount}/-</td></tr>`; }
            
            const finalTotal = subtotal - (fb.discount || 0);
            
            return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invoice - ${s.student_name}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>@media print { .no-print { display:none; } }*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}body{background:#f4f7fc;padding:20px;display:flex;justify-content:center;}.invoice-a4{max-width:1000px;width:100%;background:white;border-radius:12px;padding:20px;margin:0;}.header{text-align:center;margin-bottom:15px;border-bottom:2px solid #1b4f9b;padding-bottom:10px;}.coaching-info h1{font-size:1.5rem;color:#1b4f9b;}.coaching-info p{margin:2px 0;color:#4a5568;font-size:0.75rem;}.title{font-size:1.2rem;font-weight:700;text-align:center;margin:10px 0;}.section{background:#f8faff;padding:10px;border-radius:8px;margin-bottom:8px;border-left:3px solid #1b4f9b;}.section-title{font-weight:700;color:#1b4f9b;margin-bottom:6px;}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}.label{color:#4b5563;font-size:0.7rem;}.value{font-weight:600;font-size:0.75rem;}table{width:100%;border-collapse:collapse;margin:6px 0;font-size:0.7rem;}th,td{padding:5px;border:1px solid #e2e8f0;text-align:left;}th{background:#1b4f9b;color:white;}.status-box{background:#f0f9ff;padding:6px;border-radius:6px;margin:6px 0;border-left:3px solid #16a34a;}.terms{font-size:0.6rem;margin-top:8px;padding-top:6px;border-top:1px dashed #1b4f9b;}.terms p{margin:2px 0;line-height:1.3;}.signature-section{display:flex;justify-content:space-between;margin-top:12px;padding-top:8px;border-top:1px solid #e2e8f0;}.signature-box{text-align:center;width:180px;}.signature-line{margin-top:25px;border-top:1px solid #000;width:160px;margin:25px auto 0;}.btn-group{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}.btn{padding:5px 14px;font-size:0.7rem;border:none;border-radius:50px;cursor:pointer;}.btn-primary{background:#1b4f9b;color:white;}.btn-success{background:#16a34a;color:white;}.btn-secondary{background:#6c757d;color:white;}</style></head><body><div class="invoice-a4"><div class="btn-group no-print"><button class="btn btn-primary" onclick="window.print()">Print</button><button class="btn btn-success" onclick="window.close()">Close</button></div><div class="header"><div class="coaching-info"><h1>${c.name}</h1><p>${c.address} | 📞 ${c.phone}</p></div></div><h2 class="title">FEE PAYMENT INVOICE</h2><div class="section"><div class="section-title">STUDENT DETAILS</div><div class="grid-2"><div><span class="label">Invoice No:</span> <span class="value">${data.invoiceNumber}</span></div><div><span class="label">Date:</span> <span class="value">${new Date().toLocaleString()}</span></div><div><span class="label">Student Name:</span> <span class="value">${s.student_name}</span></div><div><span class="label">Roll Number:</span> <span class="value">${s.roll_number}</span></div><div><span class="label">Father's Name:</span> <span class="value">${s.father_name}</span></div><div><span class="label">Class & Session:</span> <span class="value">${s.class} (${s.session})</span></div></div></div><div class="section"><div class="section-title">FEE STRUCTURE</div><table><thead><tr><th>Description</th><th>Amount (₹)</th></tr></thead><tbody>${feeRows}<tr class="total-row"><td><strong>💰 Total Fee</strong></td><td style="text-align:right;"><strong>₹${finalTotal.toLocaleString()}/-</strong></td></tr></tbody>}</div><div class="section"><div class="section-title">PAYMENT DETAILS</div><table><thead><tr><th>Description</th><th>Amount (₹)</th></tr></thead><tbody><tr><td>Total Fee</td><td>₹${Number(s.total_amount).toLocaleString()}/-</td></tr><tr><td>Previous Payment</td><td>₹${Number(s.received_amount - data.paymentAmount).toLocaleString()}/-</td></tr><tr style="background:#e8f0fe;"><td><strong>💰 Current Payment</strong></td><td><strong style="color:#16a34a;">+ ₹${data.paymentAmount.toLocaleString()}/-</strong></td></tr><tr><td><strong>✅ Total Paid</strong></td><td><strong>₹${Number(s.received_amount).toLocaleString()}/-</strong></td></tr><tr><td>⏳ Remaining Due</td><td><span style="color:#b91c1c; font-weight:700;">₹${Number(s.due_amount).toLocaleString()}/-</span></td></tr></tbody></div><div class="status-box"><p><strong>Payment Status:</strong> ${s.due_amount <= 0 ? 'FULLY PAID ✅' : 'PARTIAL PAID'}</p><p>Transaction ID: ${data.transactionId}</p></div><div class="ta-terms"><strong>नियम एवं शर्तें:</strong>${TERMS_CONDITIONS_HINDI.map(t => `<p>• ${t}</p>`).join('')}</div><div class="signature-section"><div class="signature-box"><div class="signature-line"></div><div>Authorized Signatory</div></div><div class="signature-box"><div class="signature-line"></div><div>Student/Parent Signature</div></div></div><div class="footer mt-3"><p>Thank you for timely payment!</p></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script></body></html>`;
        }

        downloadPdfBtn.addEventListener('click', function() {
            let filtered = allStudents.filter(s => s.session === sessionFilter.value);
            if (classFilter.value !== 'All') filtered = filtered.filter(s => s.class === classFilter.value);
            const searchRoll = rollSearchInput.value.trim().toLowerCase();
            if (searchRoll) filtered = filtered.filter(s => (s.roll_number || '').toString().toLowerCase().includes(searchRoll));
            let tableRows = '';
            filtered.forEach((s, index) => { tableRows += `<tr><td>${index+1}</td><td>${s.roll_number}</td><td>${s.student_name}</td><td>${s.father_name}</td><td>${s.class}</td><td>₹${Number(s.total_amount).toLocaleString()}</td><td>₹${Number(s.received_amount).toLocaleString()}</td><td>₹${Number(s.due_amount).toLocaleString()}</td><td>${s.due_amount <= 0 ? 'PAID' : 'PENDING'}</td></tr>`; });
            const printHtml = `<!DOCTYPE html><html><head><title>Fee Report</title><style>body{font-family:Arial;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ddd;padding:8px;text-align:left;}th{background:#1b4f9b;color:white;}</style></head><body><h2>${COACHING_DETAILS.name}</h2><h3>Student Fee Report</h3><p>Session: ${sessionFilter.value} | Class: ${classFilter.value} | Total Students: ${filtered.length}</p><table><thead><tr><th>#</th><th>Roll</th><th>Student</th><th>Father</th><th>Class</th><th>Total</th><th>Received</th><th>Due</th><th>Status</th></tr></thead><tbody>${tableRows}</tbody></table><p>Generated on: ${new Date().toLocaleString()}</p><p>📞 ${COACHING_DETAILS.phone}</p></body></html>`;
            const win = window.open(); win.document.write(printHtml); win.document.close(); win.print();
        });

        sessionFilter.addEventListener('change', renderTable);
        classFilter.addEventListener('change', renderTable);
        rollSearchInput.addEventListener('input', renderTable);
        loadStudents();
        setInterval(loadStudents, 10000);
    </script>
</body>
</html>
