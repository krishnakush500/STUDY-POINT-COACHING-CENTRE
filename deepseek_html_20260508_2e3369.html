<!-- FILE 1: dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>📊 Teacher Dashboard · Fee Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4fa;
            padding: 16px 12px 32px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .session-bar {
            background: white;
            border-radius: 40px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(0,20,40,0.08);
        }
        .session-bar label {
            font-weight: 700;
            color: #1e3a5f;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        select {
            background: #e8f0fe;
            border: 2px solid #c1d6f0;
            border-radius: 50px;
            padding: 10px 32px 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #113155;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%231d4e7a" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 14px center;
            min-width: 140px;
        }
        .teacher-badge {
            margin-left: auto;
            background: #d7e7ff;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #0a3a66;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .filter-section {
            background: linear-gradient(145deg, #ffffff, #eef4fc);
            border-radius: 40px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin: 10px 0 20px;
            border: 1px solid #bdd3ec;
        }
        .filter-section span {
            font-size: 1.1rem;
            font-weight: 700;
            color: #124072;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0 25px;
        }
        .summary-item {
            flex: 1 1 180px;
            min-width: 160px;
            border-radius: 32px;
            padding: 24px 10px;
            text-align: center;
            box-shadow: 0 15px 25px -8px rgba(0, 40, 70, 0.3);
            color: white;
            font-weight: 600;
            transition: transform 0.2s;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .summary-item:hover {
            transform: scale(1.02);
        }
        .summary-item.total { background: linear-gradient(145deg, #2b6ed7, #1a4bbf); }
        .summary-item.received { background: linear-gradient(145deg, #2b9c5c, #1b7a45); }
        .summary-item.due { background: linear-gradient(145deg, #d33838, #aa2424); }
        
        .summary-emoji { font-size: 2.4rem; margin-bottom: 8px; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3)); }
        .summary-label { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; margin-bottom: 6px; }
        .summary-value { font-size: 2rem; font-weight: 800; text-shadow: 0 3px 6px rgba(0,0,0,0.3); word-break: break-word; }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 25px 0 20px;
        }
        .btn {
            border: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 20px -8px #1e3b5b;
            border: 2px solid rgba(255,255,255,0.2);
            flex: 1 1 auto;
        }
        .btn-primary { background: #1b4f9b; color: white; }
        .btn-primary:hover { background: #0f3f7a; transform: translateY(-3px); }
        .btn-outline { background: white; color: #1b4f9b; border: 2px solid #1b4f9b; }
        .btn-outline:hover { background: #e1efff; }

        .updates-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-top: 20px;
            box-shadow: 0 15px 25px -10px #a5bbd5;
        }
        .updates-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .updates-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #113a5e;
        }
        .updates-title span:last-child {
            font-size: 0.9rem;
            background: #dbeafe;
            padding: 5px 15px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .view-all-btn {
            background: #1b4f9b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-all-btn:hover { background: #0f3f7a; transform: translateY(-2px); }
        .update-item {
            background: #f6faff;
            border-radius: 40px;
            padding: 14px 20px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border-left: 6px solid #f5a623;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            font-size: 1rem;
            transition: 0.2s;
        }
        .update-item:hover { transform: translateX(5px); box-shadow: 0 6px 12px rgba(0,0,0,0.05); }
        .update-date { 
            font-weight: 700; color: #0b4980; background: #d9e9ff;
            padding: 4px 12px; border-radius: 40px; font-size: 0.9rem;
        }
        .update-roll { background: #1b4f9b; color: white; padding: 4px 12px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; }
        .update-name { font-weight: 600; color: #152b3c; }
        .update-amount { margin-left: auto; font-weight: 800; background: #c7f0d2; padding: 5px 16px; border-radius: 40px; color: #0c6e3c; font-size: 1rem; white-space: nowrap; }

        @media (max-width: 600px) {
            .session-bar { flex-direction: column; align-items: stretch; border-radius: 30px; }
            .teacher-badge { margin-left: 0; text-align: center; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .summary-item { flex: 1 1 100%; }
            .updates-header { flex-direction: column; align-items: flex-start; }
            .view-all-btn { width: 100%; justify-content: center; }
            .update-item { flex-direction: column; align-items: flex-start; }
            .update-amount { margin-left: 0; width: 100%; text-align: center; }
            .btn { width: 100%; padding: 14px 20px; font-size: 1.1rem; }
            .summary-value { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="session-bar">
            <label>📆 Session</label>
            <select id="sessionSelect">
                <option value="2024-25">2024-25</option>
                <option value="2025-26">2025-26</option>
                <option value="2026-27" selected>2026-27</option>
            </select>
            <div class="teacher-badge">👨‍🏫 STUDY POINT · Fee Manager</div>
        </div>

        <div class="filter-section">
            <span>🔽 Filter by Class</span>
            <select id="classSelect">
                <option value="All">📚 All Classes</option>
                <option value="Class 6">🎒 Class 6</option>
                <option value="Class 7">📘 Class 7</option>
                <option value="Class 8">📗 Class 8</option>
                <option value="Class 9">📕 Class 9</option>
                <option value="Class 10">📙 Class 10</option>
                <option value="Class 11">📖 Class 11</option>
                <option value="Class 12">📚 Class 12</option>
            </select>
        </div>

        <div class="summary-row">
            <div class="summary-item total">
                <div class="summary-emoji">💰💰</div>
                <div class="summary-label">TOTAL FEE</div>
                <div class="summary-value" id="totalAmount">₹0</div>
            </div>
            <div class="summary-item received">
                <div class="summary-emoji">✅✅</div>
                <div class="summary-label">RECEIVED</div>
                <div class="summary-value" id="receivedAmount">₹0</div>
            </div>
            <div class="summary-item due">
                <div class="summary-emoji">⏳⏳</div>
                <div class="summary-label">DUE AMOUNT</div>
                <div class="summary-value" id="dueAmount">₹0</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="addStudentBtn">➕ ADD STUDENT</button>
            <button class="btn btn-outline" id="updateStudentBtn">✏️ UPDATE STUDENT</button>
        </div>

        <div class="updates-card">
            <div class="updates-header">
                <div class="updates-title">
                    <span>📋 RECENT UPDATES</span>
                    <span>Latest 3</span>
                </div>
                <button class="view-all-btn" id="viewAllBtn">
                    <i class="fas fa-eye"></i> View All Updates
                </button>
            </div>
            <div id="recentUpdatesList">
                <div class="update-item">⏳ Loading updates from database...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDN5ATO_LQ-3THveZDGyvLjtjjavgTIJk",
            authDomain: "study-point-coaching-centre.firebaseapp.com",
            projectId: "study-point-coaching-centre",
            storageBucket: "study-point-coaching-centre.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const feesCollection = db.collection('fees_study_point');

        const sessionSelect = document.getElementById('sessionSelect');
        const classSelect = document.getElementById('classSelect');
        const totalSpan = document.getElementById('totalAmount');
        const receivedSpan = document.getElementById('receivedAmount');
        const dueSpan = document.getElementById('dueAmount');
        const recentList = document.getElementById('recentUpdatesList');
        const viewAllBtn = document.getElementById('viewAllBtn');

        let allStudents = [];
        let allUpdates = [];

        async function loadStudentsFromFirebase() {
            try {
                const snapshot = await feesCollection.get();
                allStudents = [];
                allUpdates = [];
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    allStudents.push({ id: doc.id, ...data });
                    if (data.received_amount > 0) {
                        allUpdates.push({ ...data, id: doc.id });
                    }
                });
                
                allUpdates.sort((a, b) => (b.student_name || '').localeCompare(a.student_name || ''));
                updateDashboard();
                loadRecentUpdates();
            } catch (error) {
                console.error('Error loading students:', error);
                if (recentList) recentList.innerHTML = '<div class="update-item">❌ Error loading from database</div>';
            }
        }

        function updateDashboard() {
            const selectedSession = sessionSelect.value;
            const selectedClass = classSelect.value;

            let filteredStudents = allStudents.filter(s => s.session === selectedSession);
            if (selectedClass !== 'All') filteredStudents = filteredStudents.filter(s => s.class === selectedClass);

            let total = 0, received = 0, due = 0;
            filteredStudents.forEach(s => {
                total += Number(s.total_amount) || 0;
                received += Number(s.received_amount) || 0;
                due += Number(s.due_amount) || 0;
            });

            totalSpan.innerText = '₹' + total.toLocaleString();
            receivedSpan.innerText = '₹' + received.toLocaleString();
            dueSpan.innerText = '₹' + due.toLocaleString();
        }

        async function loadRecentUpdates() {
            try {
                const recent = allUpdates.slice(-3).reverse();
                if (recent.length === 0) {
                    recentList.innerHTML = '<div class="update-item">📌 No recent payments</div>';
                    return;
                }
                recentList.innerHTML = '';
                recent.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'update-item';
                    const today = new Date();
                    const dateStr = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                    div.innerHTML = `
                        <span class="update-date">${dateStr}</span>
                        <span class="update-roll">Roll ${s.roll_number}</span>
                        <span class="update-name">${s.student_name}</span>
                        <span class="update-amount">₹${s.received_amount} received</span>
                    `;
                    recentList.appendChild(div);
                });
            } catch (error) { console.error('Error loading recent updates:', error); }
        }

        function showAllUpdates() {
            if (allUpdates.length === 0) {
                Swal.fire({ title: 'No Updates', text: 'No payment updates found', icon: 'info', confirmButtonColor: '#1b4f9b', confirmButtonText: 'Close' });
                return;
            }
            let updatesHTML = '<div style="max-height: 400px; overflow-y: auto; padding: 5px;">';
            allUpdates.slice().reverse().forEach((s) => {
                const today = new Date();
                const dateStr = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                updatesHTML += `
                    <div style="background: #f8faff; padding: 12px; margin-bottom: 10px; border-radius: 12px; border-left: 4px solid #f5a623;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                            <div>
                                <strong style="font-size: 1rem; color: #113155;">${s.student_name}</strong>
                                <span style="background: #1b4f9b; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; margin-left: 8px;">Roll ${s.roll_number}</span>
                            </div>
                            <div style="background: #c7f0d2; padding: 4px 12px; border-radius: 30px; color: #0c6e3c; font-weight: bold;">₹${s.received_amount}</div>
                        </div>
                        <div style="font-size: 0.85rem; color: #666; margin-top: 8px; display: flex; gap: 15px; flex-wrap: wrap;">
                            <span><i class="fas fa-school" style="color: #1b4f9b;"></i> ${s.class}</span>
                            <span><i class="fas fa-calendar" style="color: #1b4f9b;"></i> ${s.session}</span>
                            <span><i class="fas fa-clock" style="color: #1b4f9b;"></i> ${dateStr}</span>
                        </div>
                        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;"><i class="fas fa-user-tie"></i> ${s.father_name}</div>
                    </div>
                `;
            });
            updatesHTML += '</div>';
            Swal.fire({ title: '<span style="color: #1b4f9b;"><i class="fas fa-history"></i> All Payment Updates</span>', html: updatesHTML, icon: 'info', showConfirmButton: true, confirmButtonText: '<i class="fas fa-times"></i> Close', confirmButtonColor: '#1b4f9b', showCloseButton: true, width: '650px' });
        }

        sessionSelect.addEventListener('change', updateDashboard);
        classSelect.addEventListener('change', updateDashboard);
        viewAllBtn.addEventListener('click', showAllUpdates);
        
        document.getElementById('addStudentBtn').addEventListener('click', () => { window.location.href = 'add-student-study-point.html'; });
        document.getElementById('updateStudentBtn').addEventListener('click', () => { window.location.href = 'update-student-study-point.html'; });

        sessionSelect.value = '2026-27';
        loadStudentsFromFirebase();
        setInterval(() => { if (allStudents.length > 0) loadStudentsFromFirebase(); }, 10000);
    </script>
</body>
</html>
